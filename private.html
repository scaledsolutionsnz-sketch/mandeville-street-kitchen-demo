<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Feedback | Mandeville Street Kitchen</title>
<meta name="description" content="Send private feedback to Mandeville Street Kitchen.">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#241b16">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23241b16'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='17' fill='%23c2603c' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="review-page">
  <div class="review-card" style="text-align:left;">
    <p class="eyebrow" style="text-align:left;">Private feedback</p>
    <h1>Tell us what happened</h1>
    <p>This message goes straight to Sarah and isn't posted publicly. We read every one and we'll make it right where we can.</p>
    <form class="form" style="box-shadow:none;padding:0;margin-top:8px;" action="https://formsubmit.co/hello@mandevillestreetkitchen.co.nz" method="POST">
      <input type="hidden" name="_subject" value="Private feedback — Mandeville Street Kitchen">
      <input type="hidden" name="_template" value="table">
      <input type="text" name="_honey" style="display:none">
      <div class="field">
        <label for="name">Your name</label>
        <input id="name" type="text" name="name" required placeholder="First and last name">
      </div>
      <div class="field">
        <label for="contact">Phone or email (so we can reply)</label>
        <input id="contact" type="text" name="contact" required placeholder="How can we reach you?">
      </div>
      <div class="field">
        <label for="message">What could we have done better?</label>
        <textarea id="message" name="message" required placeholder="Tell us about your visit — the more detail the better."></textarea>
      </div>
      <button type="submit" class="btn btn--primary">Send feedback</button>
    </form>
    <a class="back-link" href="index.html">← Back to the website</a>
  </div>
</main>
</body>
</html>
